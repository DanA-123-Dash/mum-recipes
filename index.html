<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recipes">
<title>Mum's Recipes</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm-white: #fffdf9;
    --ink: #2c2416;
    --ink-light: #6b5d4f;
    --rust: #c4622d;
    --rust-light: #e8845a;
    --sage: #7a9e7e;
    --amber: #d4860a;
    --card-shadow: 0 2px 12px rgba(44,36,22,0.10);
    --card-shadow-hover: 0 8px 32px rgba(44,36,22,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Lato', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 40px);
    padding-bottom: 40px;
  }

  /* ── PROFILE PICKER ──────────────────────────────────────────────── */
  .profile-screen {
    position: fixed;
    inset: 0;
    background: var(--ink);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 32px;
  }

  .profile-screen.hidden { display: none; }

  .profile-screen h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--cream);
    text-align: center;
  }

  .profile-screen p {
    font-size: 15px;
    color: rgba(250,246,240,0.6);
    text-align: center;
    margin-top: -20px;
  }

  .profile-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 320px;
  }

  .profile-card {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 20px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .profile-card:active { transform: scale(0.97); }
  .profile-card:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }

  .profile-emoji { font-size: 32px; }

  .profile-card-text strong {
    display: block;
    font-size: 17px;
    color: var(--cream);
    font-weight: 700;
    margin-bottom: 2px;
  }

  .profile-card-text span {
    font-size: 13px;
    color: rgba(250,246,240,0.5);
    font-weight: 300;
  }

  /* ── HEADER ──────────────────────────────────────────────────────── */
  header {
    background: var(--ink);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header-left { display: flex; align-items: baseline; gap: 10px; }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--cream);
    letter-spacing: -0.5px;
  }

  header .count {
    font-size: 13px;
    color: var(--rust-light);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .profile-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 12px 6px 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s;
  }

  .profile-pill:active { background: rgba(255,255,255,0.15); }
  .profile-pill .pill-emoji { font-size: 16px; }
  .profile-pill .pill-name { font-size: 13px; color: var(--cream); font-weight: 700; }

  .search-bar {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 10px 16px;
    gap: 10px;
  }

  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--cream);
    font-family: 'Lato', sans-serif;
    font-size: 16px;
    width: 100%;
  }

  .search-bar input::placeholder { color: rgba(250,246,240,0.35); }
  .search-icon { color: rgba(250,246,240,0.45); font-size: 16px; }

  /* ── FILTERS ─────────────────────────────────────────────────────── */
  .filters {
    padding: 14px 16px 6px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    white-space: nowrap;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid rgba(44,36,22,0.18);
    background: transparent;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 400;
    -webkit-tap-highlight-color: transparent;
  }

  .filter-btn.active {
    background: var(--rust);
    border-color: var(--rust);
    color: white;
    font-weight: 700;
  }

  .filter-btn:hover:not(.active) { border-color: var(--rust); color: var(--rust); }

  /* ── SURPRISE ME ─────────────────────────────────────────────────── */
  .surprise-banner {
    margin: 10px 16px 4px;
    background: linear-gradient(135deg, var(--sage) 0%, #5a8060 100%);
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(90,128,96,0.3);
    -webkit-tap-highlight-color: transparent;
  }

  .surprise-banner:active { transform: scale(0.98); }
  .surprise-text { color: white; }
  .surprise-text strong { font-size: 16px; display: block; font-weight: 700; }
  .surprise-text span { font-size: 13px; opacity: 0.85; font-weight: 300; }
  .surprise-dice { font-size: 30px; }

  /* ── SECTION LABEL ───────────────────────────────────────────────── */
  .section-label {
    padding: 14px 16px 8px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 700;
  }

  /* ── RECIPE GRID ─────────────────────────────────────────────────── */
  .recipe-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 14px;
  }

  .recipe-card {
    background: var(--warm-white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .recipe-card:active { transform: scale(0.97); }

  /* Allergen warning state */
  .recipe-card.allergen-flagged .card-img,
  .recipe-card.allergen-flagged .card-img-placeholder {
    filter: grayscale(1);
    opacity: 0.45;
  }

  .allergen-badge {
    display: none;
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--amber);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 8px;
    z-index: 2;
    letter-spacing: 0.3px;
  }

  .recipe-card.allergen-flagged .allergen-badge { display: block; }

  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    background: #e8ddd0;
  }

  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    background: linear-gradient(135deg, #f0e8dc, #e8ddd0);
  }

  .card-body { padding: 10px 12px 12px; }

  .card-category {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--rust);
    font-weight: 700;
    margin-bottom: 3px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    line-height: 1.3;
    color: var(--ink);
  }

  .card-meta {
    margin-top: 7px;
    font-size: 11px;
    color: var(--ink-light);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ── LOADING STATE ───────────────────────────────────────────────── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
    color: var(--ink-light);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(44,36,22,0.12);
    border-top-color: var(--rust);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RECIPE MODAL ────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,36,22,0.55);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal-wrapper { position: relative; width: 100%; }

  .modal {
    background: var(--warm-white);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-hero {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }

  .modal-hero-placeholder {
    width: 100%;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 70px;
    background: linear-gradient(135deg, #f0e8dc, #e8ddd0);
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: rgba(44,36,22,0.15);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .modal-content { padding: 16px 22px 48px; }

  .modal-category {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--rust);
    font-weight: 700;
    margin-bottom: 5px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .modal-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 13px;
    color: var(--ink-light);
    margin-bottom: 10px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(44,36,22,0.08);
  }

  .dietary-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 10px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .badge-green { background: #e8f4ea; color: #3a7a3f; }
  .badge-blue  { background: #e8eef8; color: #3a5a8a; }
  .badge-amber { background: #fef3e0; color: #a06000; }

  .modal-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    margin-bottom: 10px;
    margin-top: 20px;
    color: var(--ink);
  }

  .ingredient-group-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--rust);
    margin: 14px 0 6px;
  }

  .ingredients-list { list-style: none; margin-bottom: 4px; }

  .ingredients-list li {
    padding: 8px 0;
    border-bottom: 1px solid rgba(44,36,22,0.06);
    font-size: 15px;
    display: flex;
    gap: 10px;
    align-items: baseline;
    line-height: 1.4;
  }

  .ingredients-list li::before {
    content: '';
    width: 5px;
    height: 5px;
    min-width: 5px;
    border-radius: 50%;
    background: var(--rust);
    margin-top: 7px;
  }

  .method-steps { margin-bottom: 20px; }

  .method-step {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    align-items: flex-start;
  }

  .step-number {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    margin-top: 1px;
  }

  .step-text { font-size: 15px; line-height: 1.6; color: var(--ink); }

  .nutrition-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .nutrition-cell {
    background: rgba(44,36,22,0.04);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }

  .nutrition-cell .nut-val { font-size: 16px; font-weight: 700; color: var(--ink); display: block; }
  .nutrition-cell .nut-lbl { font-size: 10px; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.5px; }

  .source-line {
    font-size: 12px;
    color: var(--ink-light);
    font-style: italic;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(44,36,22,0.08);
  }

  .close-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(44,36,22,0.45);
    border: none;
    color: white;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── ALLERGEN INTERSTITIAL ───────────────────────────────────────── */
  .allergen-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,36,22,0.7);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .allergen-overlay.open { opacity: 1; pointer-events: all; }

  .allergen-card {
    background: var(--warm-white);
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 340px;
    width: 100%;
    text-align: center;
  }

  .allergen-card .warn-icon { font-size: 48px; margin-bottom: 12px; }

  .allergen-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .allergen-card p {
    font-size: 14px;
    color: var(--ink-light);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .allergen-card p strong { color: var(--amber); }

  .allergen-btns { display: flex; gap: 10px; }

  .allergen-btns button {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    border: none;
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-cancel { background: rgba(44,36,22,0.08); color: var(--ink); }
  .btn-view   { background: var(--rust); color: white; }

  /* ── PESCATARIAN PILL ────────────────────────────────────────────── */
  .pesc-pill {
    font-size: 12px;
    color: var(--sage);
    background: rgba(122,158,126,0.15);
    border: 1px solid rgba(122,158,126,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    margin-top: 8px;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: inline-block;
  }

  /* ── LIGHTBOX ────────────────────────────────────────────────────── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    cursor: zoom-out;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 100%; max-height: 92vh; object-fit: contain; border-radius: 4px; }

  /* ── SUGGESTED SIDES ─────────────────────────────────────────────── */
  .suggested-row {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid rgba(44,36,22,0.08);
  }
  .suggested-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .suggested-scroll::-webkit-scrollbar { display: none; }
  .suggested-mini {
    flex: 0 0 120px;
    background: var(--cream);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s;
  }
  .suggested-mini:active { transform: scale(0.96); }
  .suggested-mini img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #e8ddd0; }
  .suggested-mini-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: linear-gradient(135deg, #f0e8dc, #e8ddd0);
  }
  .suggested-mini-body { padding: 6px 8px 8px; }
  .suggested-mini-title { font-family: 'Playfair Display', serif; font-size: 12px; line-height: 1.3; color: var(--ink); }

  /* ── COLLECTIONS SECTION ─────────────────────────────────────────── */
  .collections-section { padding: 0 16px 14px; }
  .collections-scroll { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
  .collections-scroll::-webkit-scrollbar { display: none; }
  .collection-card {
    flex: 0 0 140px;
    background: var(--warm-white);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s;
  }
  .collection-card:active { transform: scale(0.97); }
  .collection-thumb-strip { display: flex; height: 70px; overflow: hidden; }
  .collection-thumb-strip img { flex: 1; object-fit: cover; min-width: 0; }
  .collection-thumb-placeholder {
    flex: 1;
    background: linear-gradient(135deg, #f0e8dc, #e8ddd0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .collection-card-body { padding: 8px 10px 10px; }
  .collection-emoji { font-size: 18px; }
  .collection-name { font-family: 'Playfair Display', serif; font-size: 13px; line-height: 1.3; color: var(--ink); margin-top: 2px; }
  .collection-count { font-size: 11px; color: var(--ink-light); margin-top: 2px; }
  .new-collection-card {
    flex: 0 0 90px;
    background: rgba(44,36,22,0.04);
    border: 2px dashed rgba(44,36,22,0.15);
    border-radius: 14px;
    height: 122px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 5px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s;
  }
  .new-collection-card:active { background: rgba(44,36,22,0.08); }
  .new-collection-card .nc-plus { font-size: 22px; color: var(--ink-light); }
  .new-collection-card .nc-label { font-size: 12px; color: var(--ink-light); font-weight: 700; }

  /* ── ADD TO COLLECTION BUTTON ────────────────────────────────────── */
  .add-to-collection-btn {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    background: rgba(44,36,22,0.06);
    border: 1.5px solid rgba(44,36,22,0.12);
    border-radius: 12px;
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .add-to-collection-btn:active { background: rgba(44,36,22,0.1); }

  /* ── COLLECTION BOTTOM SHEET ─────────────────────────────────────── */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,36,22,0.55);
    z-index: 400;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: all; }
  .bottom-sheet {
    background: var(--warm-white);
    border-radius: 24px 24px 0 0;
    width: 100%;
    padding: 20px 20px 44px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height: 70vh;
    overflow-y: auto;
  }
  .sheet-overlay.open .bottom-sheet { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 4px; background: rgba(44,36,22,0.15); border-radius: 2px; margin: 0 auto 16px; }
  .sheet-title { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 14px; }
  .collection-option {
    display: flex;
    align-items: center;
    gap: 12px;

  .col-opt-name { font-size: 15px; font-weight: 700; color: var(--ink); }

  .new-col-option {

    padding: 14px 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;

    font-weight: 700;

  /* ── COLLECTION DETAIL ───────────────────────────────────────────── */
  .collection-detail {
    position: fixed;
    inset: 0;

    z-index: 350;
    overflow-y: auto;
    transform: translateY(100%);

  .collection-detail-back {

    top: 14px;

    font-size: 18px;

    align-items: center;

  .collection-detail-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--cream); }
  .collection-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px; }
  .remove-from-col {

  /* ── COOK LOG ────────────────────────────────────────────────────── */
  .cook-log-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(44,36,22,0.08); }
  .cook-log-entries { margin-bottom: 14px; }
  .log-entry { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid rgba(44,36,22,0.06); }
  .log-entry-stars { font-size: 15px; color: var(--amber); white-space: nowrap; }
  .log-entry-body { flex: 1; }
  .log-entry-meta { font-size: 11px; color: var(--ink-light); margin-bottom: 2px; }
  .log-entry-note { font-size: 14px; color: var(--ink); }
  .log-cook-btn {
    display: inline-flex;
    align-items: center;

    border-radius: 10px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;

  .log-cook-btn:active { opacity: 0.85; }
  .log-form { margin-top: 12px; padding: 14px; background: rgba(44,36,22,0.04); border-radius: 12px; }
  .star-picker { display: flex; gap: 2px; margin-bottom: 10px; }
  .star-btn {
    font-size: 26px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 2px;
    opacity: 0.25;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    color: var(--amber);
  }
  .star-btn.selected { opacity: 1; }
  .star-btn:active { transform: scale(1.2); }
  .log-note-input {

    padding: 10px 12px;
    border: 1px solid rgba(44,36,22,0.15);
    border-radius: 8px;
    background: white;
    font-family: 'Lato', sans-serif;
    font-size: 14px;

    resize: none;

    padding: 10px 20px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<!-- ── PROFILE PICKER ──────────────────────────────────────────────────── -->
<div class="profile-screen" id="profileScreen">
  <h1>Mum's Recipes</h1>
  <p>Who's cooking today?</p>
  <div class="profile-cards">
    <div class="profile-card" onclick="selectProfile('mum')">
      <span class="profile-emoji">👩‍🍳</span>
      <div class="profile-card-text">
        <strong>Mum</strong>
        <span>Veggie &amp; fish</span>
      </div>
    </div>
    <div class="profile-card" onclick="selectProfile('dan')">
      <span class="profile-emoji">👨‍💻</span>
      <div class="profile-card-text">
        <strong>Dan</strong>
        <span>All recipes</span>
      </div>
    </div>
    <div class="profile-card" onclick="selectProfile('cat')">
      <span class="profile-emoji">🐱</span>
      <div class="profile-card-text">
        <strong>Cat</strong>
        <span>Nut warnings shown</span>
      </div>
    </div>
  </div>
</div>

<!-- ── HEADER ──────────────────────────────────────────────────────────── -->
<header>
  <div class="header-top">
    <div class="header-left">
      <h1>Mum's Recipes</h1>
      <span class="count" id="recipeCount"></span>
    </div>
    <div class="profile-pill" id="profilePill" onclick="showProfileScreen()">
      <span class="pill-emoji" id="pillEmoji"></span>

  </div>
  <div class="search-bar">

<!-- ── FILTERS ─────────────────────────────────────────────────────────── -->

<!-- ── SURPRISE ME ─────────────────────────────────────────────────────── -->

<div class="section-label" id="sectionLabel"></div>
<div class="recipe-grid" id="recipeGrid"></div>

<!-- ── COLLECTIONS SECTION ──────────────────────────────────────────── -->

<!-- ── RECIPE MODAL ─────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal-wrapper">

        <div class="modal-category" id="modalCategory"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="dietary-badges" id="modalBadges"></div>
        <div id="modalIngredientSection"></div>
        <div class="modal-section-title">Method</div>
        <div class="method-steps" id="modalMethod"></div>
        <div id="modalNutrition"></div>
        <div id="modalSource"></div>
        <button class="add-to-collection-btn" onclick="showCollectionSheet()">＋ Add to Collection</button>
        <div id="modalSuggested"></div>

<!-- ── ALLERGEN INTERSTITIAL ────────────────────────────────────────────── -->
<div class="allergen-overlay" id="allergenOverlay">

    <div class="warn-icon">⚠️</div>

      <button class="btn-cancel" onclick="closeAllergenModal()">Cancel</button>

<!-- ── LIGHTBOX ───────────────────────────────────────────────────────────── -->

  <div class="bottom-sheet" id="sheetContent"></div>

<div class="collection-detail" id="collectionDetail">
  <div class="collection-detail-header">
    <button class="collection-detail-back" onclick="closeCollectionDetail()">←</button>
    <div class="collection-detail-title" id="collectionDetailTitle"></div>
  </div>
  <div class="collection-detail-grid" id="collectionDetailGrid"></div>
</div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let allRecipes = [];
let activeFilter = 'All';
let pendingRecipeId = null;
let currentRecipe  = null;
let selectedRating = 0;
let wakeLock = null;

const PROFILES = {
  mum: { emoji: '👩‍🍳', name: 'Mum', hideMeat: true },
  dan: { emoji: '👨‍💻', name: 'Dan' },
  cat: { emoji: '🐱',  name: 'Cat' },
};

const MEAT_KEYWORDS = [
  'chicken','beef','pork','lamb','mince','bacon','turkey','duck','veal','venison',
  'sausage','ham','steak','chorizo','salami','prosciutto','pancetta','bresaola',
  'gammon','lardons','pepperoni','mortadella','rabbit',
];

function isMeatRecipe(recipe) {
  const ings = recipe.ingredients || [];
  return ings.some(i => {
    const name = (i.ingredient || '').toLowerCase();
    return MEAT_KEYWORDS.some(k => name.includes(k));
  });
}

const CATEGORY_EMOJI = {
  mains: '🍗', bakes: '🍰', soups: '🥣', sides: '🥗',
  desserts: '🍮', breakfast: '🍳', lunch: '🥪', snacks: '🍎',
};

// ── Fractions formatter ─────────────────────────────────────────────────────
const FRACTIONS = { 0.25:'¼', 0.33:'⅓', 0.5:'½', 0.67:'⅔', 0.75:'¾' };
function fmtQty(qty) {
  if (qty == null) return '';
  const whole = Math.floor(qty);
  const frac = Math.round((qty - whole) * 100) / 100;
  const fracStr = FRACTIONS[frac] || (frac > 0 ? frac.toString() : '');
  return whole > 0 ? (fracStr ? `${whole} ${fracStr}` : `${whole}`) : (fracStr || qty.toString());
}

function fmtIngredient(ing) {
  const qty  = fmtQty(ing.quantity);
  const unit = ing.unit || '';
  const name = ing.ingredient || '';
  const note = ing.notes ? ` <em style="color:var(--ink-light);font-style:normal">(${ing.notes})</em>` : '';
  return [qty, unit, name].filter(Boolean).join(' ') + note;
}

// ── Profile ─────────────────────────────────────────────────────────────────
function getProfile() { return localStorage.getItem('activeProfile') || null; }

function selectProfile(id) {
  localStorage.setItem('activeProfile', id);
  document.getElementById('profileScreen').classList.add('hidden');
  updateProfilePill();
  renderGrid();
}

function showProfileScreen() {
  document.getElementById('profileScreen').classList.remove('hidden');
}

function updateProfilePill() {
  const id = getProfile();
  if (!id) return;
  const p = PROFILES[id];
  document.getElementById('pillEmoji').textContent = p.emoji;
  document.getElementById('pillName').textContent  = p.name;
}

function isAllergenFlagged(recipe) {
  return getProfile() === 'cat' && (recipe.hazelnut || recipe.brazil_nut);
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function init() {
  // Show or skip profile screen
  if (getProfile()) {
    document.getElementById('profileScreen').classList.add('hidden');
    updateProfilePill();
  }

  document.getElementById('recipeGrid').innerHTML =
    '<div class="loading" style="grid-column:1/-1"><div class="spinner"></div><span>Loading recipes…</span></div>';

  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allRecipes = await res.json();
  } catch (e) {
    document.getElementById('recipeGrid').innerHTML =
      `<div class="loading" style="grid-column:1/-1">⚠️ Could not load recipes.<br><small>${e.message}</small></div>`;
    return;
  }

  buildFilters();
  renderGrid();
  renderCollectionsSection();
}

// ── Filters ──────────────────────────────────────────────────────────────────
function buildFilters() {
  const cats = ['All', ...new Set(allRecipes.map(r => r.category).filter(Boolean).map(c => c.charAt(0).toUpperCase() + c.slice(1)))];
  const el = document.getElementById('filters');
  el.innerHTML = cats.map((c, i) =>
    `<button class="filter-btn${i===0?' active':''}" onclick="setFilter('${c}',this)">${CATEGORY_EMOJI[c.toLowerCase()]||''} ${c}</button>`
  ).join('');
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

// ── Render grid ───────────────────────────────────────────────────────────────
function renderGrid() {
  const q       = (document.getElementById('searchInput').value || '').toLowerCase();
  const profile = getProfile();
  let data = allRecipes;

  if (activeFilter !== 'All') {
    data = data.filter(r => r.category?.toLowerCase() === activeFilter.toLowerCase());
  }

  if (q) {
    data = data.filter(r =>
      r.title?.toLowerCase().includes(q) ||
      (r.ingredients || []).some(i => i.ingredient?.toLowerCase().includes(q))
    );
  }

  // Mum's pescatarian filter — hide meat recipes
  if (PROFILES[profile]?.hideMeat) {
    data = data.filter(r => !isMeatRecipe(r));
  }

  // Show/hide pescatarian pill
  const pill = document.getElementById('pescPill');
  if (pill) pill.style.display = PROFILES[profile]?.hideMeat ? 'inline-block' : 'none';

  const label = activeFilter === 'All' ? `All Recipes (${data.length})` : `${activeFilter} (${data.length})`;
  document.getElementById('sectionLabel').textContent = label;
  document.getElementById('recipeCount').textContent = `${allRecipes.length} recipes`;

  const grid = document.getElementById('recipeGrid');
  if (!data.length) {
    grid.innerHTML = '<div class="loading" style="grid-column:1/-1">No recipes found.</div>';
    return;
  }

  grid.innerHTML = data.map(r => {
    const flagged = isAllergenFlagged(r);
    const img = r.image_url
      ? `<img class="card-img" src="${r.image_url}" alt="${r.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-img-placeholder" style="display:none">${CATEGORY_EMOJI[r.category] || '🍽'}</div>`
      : `<div class="card-img-placeholder">${CATEGORY_EMOJI[r.category] || '🍽'}</div>`;

    return `
      <div class="recipe-card${flagged ? ' allergen-flagged' : ''}" onclick="handleCardClick('${r.id}')">
        <div class="allergen-badge">⚠ Nuts</div>
        ${img}
        <div class="card-body">
          <div class="card-category">${r.category || ''}</div>
          <div class="card-title">${r.title}</div>
          <div class="card-meta">
            ${r.total_mins ? `<span>⏱ ${r.total_mins} mins</span>` : ''}
            ${r.serves ? `<span>👥 ${r.serves}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── Card click ────────────────────────────────────────────────────────────────
function handleCardClick(id) {
  const r = allRecipes.find(x => x.id === id);
  if (!r) return;
  if (isAllergenFlagged(r)) {
    showAllergenWarning(r);
  } else {
    openRecipe(r);
  }
}

// ── Allergen interstitial ──────────────────────────────────────────────────────
function showAllergenWarning(r) {
  pendingRecipeId = r.id;
  const nuts = [];
  if (r.hazelnut)   nuts.push('hazelnuts');
  if (r.brazil_nut) nuts.push('brazil nuts');
  document.getElementById('allergenTitle').textContent = r.title;
  document.getElementById('allergenMsg').innerHTML =
    `This recipe contains <strong>${nuts.join(' and ')}</strong>. Cat has an allergy to these.`;
  document.getElementById('allergenOverlay').classList.add('open');
}

function closeAllergenModal() {
  document.getElementById('allergenOverlay').classList.remove('open');
  pendingRecipeId = null;
}

function openAfterWarning() {
  const r = allRecipes.find(x => x.id === pendingRecipeId);
  document.getElementById('allergenOverlay').classList.remove('open');
  pendingRecipeId = null;
  if (r) openRecipe(r);
}

// ── Recipe modal ───────────────────────────────────────────────────────────────
function openRecipe(r) {
  currentRecipe = r;

  // Hero image (tap to open lightbox)
  const hero = document.getElementById('modalHero');
  if (r.image_url) {
    hero.innerHTML = `<img class="modal-hero" src="${r.image_url}" alt="${r.title}" onclick="openLightbox(this.src)" style="cursor:zoom-in" onerror="this.parentElement.innerHTML='<div class=modal-hero-placeholder>${CATEGORY_EMOJI[r.category]||'🍽'}</div>'">`;
  } else {
    hero.innerHTML = `<div class="modal-hero-placeholder">${CATEGORY_EMOJI[r.category] || '🍽'}</div>`;
  }

  document.getElementById('modalCategory').textContent = `${r.category || ''} ${r.cuisine_primary ? '· ' + r.cuisine_primary : ''}`.trim();
  document.getElementById('modalTitle').textContent = r.title;

  // Meta row
  const meta = [];
  if (r.total_mins)  meta.push(`⏱ ${r.total_mins} mins`);
  if (r.serves)      meta.push(`👥 Serves ${r.serves}`);
  if (r.difficulty)  meta.push(`${r.difficulty}`);
  if (r.kcal)        meta.push(`🔥 ${r.kcal} kcal`);
  document.getElementById('modalMeta').innerHTML = meta.map(m => `<span>${m}</span>`).join('');

  // Dietary badges
  const badges = [];
  if (r.vegetarian) badges.push(['V', 'green']);
  if (r.vegan)      badges.push(['VG', 'green']);
  if (r.gluten_free) badges.push(['GF', 'blue']);
  if (r.dairy_free)  badges.push(['DF', 'blue']);
  if (r.freezable)   badges.push(['Freezable', 'amber']);
  document.getElementById('modalBadges').innerHTML =
    badges.map(([t,c]) => `<span class="badge badge-${c}">${t}</span>`).join('');

  // Ingredients (with group headers)
  const ings = r.ingredients || [];
  let ingHtml = '<div class="modal-section-title">Ingredients</div>';
  let currentGroup = null;
  const listItems = [];

  for (const ing of ings) {
    if (ing.group && ing.group !== currentGroup) {
      if (listItems.length) {
        ingHtml += `<ul class="ingredients-list">${listItems.join('')}</ul>`;
        listItems.length = 0;
      }
      ingHtml += `<div class="ingredient-group-label">${ing.group}</div>`;
      currentGroup = ing.group;
    }
    listItems.push(`<li>${fmtIngredient(ing)}</li>`);
  }
  if (listItems.length) ingHtml += `<ul class="ingredients-list">${listItems.join('')}</ul>`;
  document.getElementById('modalIngredientSection').innerHTML = ingHtml;

  // Method steps
  const method = r.method || [];
  document.getElementById('modalMethod').innerHTML = method.map((s, i) => `
    <div class="method-step">
      <div class="step-number">${i + 1}</div>
      <div class="step-text">${s}</div>
    </div>`).join('');

  // Nutrition
  const hasNutrition = r.kcal || r.protein_g;
  document.getElementById('modalNutrition').innerHTML = hasNutrition ? `
    <div class="modal-section-title">Nutrition per serving</div>
    <div class="nutrition-grid">
      ${r.kcal       ? `<div class="nutrition-cell"><span class="nut-val">${r.kcal}</span><span class="nut-lbl">kcal</span></div>` : ''}
      ${r.protein_g  ? `<div class="nutrition-cell"><span class="nut-val">${r.protein_g}g</span><span class="nut-lbl">protein</span></div>` : ''}
    </div>` : '';

  // Source
  document.getElementById('modalSource').innerHTML = r.source_publication
    ? `<div class="source-line">Source: ${r.source_publication}${r.source_date ? ', ' + r.source_date : ''}</div>`
    : '';

  // Suggested sides
  document.getElementById('modalSuggested').innerHTML = renderSuggestions(r);

  // Cook log
  document.getElementById('modalCookLog').innerHTML = renderCookLog(r);

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Screen Wake Lock — keep screen on while cooking
  requestWakeLock();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  releaseWakeLock();
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── Wake Lock ──────────────────────────────────────────────────────────────────
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (_) {}
  }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// Re-acquire wake lock if page becomes visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && document.getElementById('modalOverlay').classList.contains('open')) {
    requestWakeLock();
  }
});

// ── Surprise Me ────────────────────────────────────────────────────────────────
function surpriseMe() {
  if (!allRecipes.length) return;
  const eligible = allRecipes.filter(r => !isAllergenFlagged(r));
  const pool = eligible.length ? eligible : allRecipes;
  const r = pool[Math.floor(Math.random() * pool.length)];
  openRecipe(r);
}

// ── Lightbox ───────────────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    closeCollectionSheet();
  }
});

// ── Suggested sides ────────────────────────────────────────────────────────────
const COMPLEMENTARY_CATS = {
  mains:     ['sides', 'soups', 'desserts'],
  main:      ['sides', 'soups', 'desserts'],
  sides:     ['mains'],
  side:      ['mains'],
  desserts:  ['bakes'],
  dessert:   ['bakes'],
};

function getSuggestions(recipe) {
  const cat     = (recipe.category || '').toLowerCase();
  const cuisine = (recipe.cuisine_primary || '').toLowerCase();
  const targets = COMPLEMENTARY_CATS[cat] || [];
  if (!targets.length) return [];

  // Priority 1: same cuisine + complementary category
  let pool = allRecipes.filter(r =>
    r.id !== recipe.id &&
    targets.includes((r.category || '').toLowerCase()) &&
    cuisine && (r.cuisine_primary || '').toLowerCase() === cuisine
  );

  // Fallback: complementary category any cuisine
  if (pool.length < 3) {
    const extra = allRecipes.filter(r =>
      r.id !== recipe.id &&
      !pool.find(s => s.id === r.id) &&
      targets.includes((r.category || '').toLowerCase())
    );
    pool = [...pool, ...extra];
  }

  return pool.slice(0, 3);
}

function renderSuggestions(recipe) {
  const list = getSuggestions(recipe);
  if (!list.length) return '';
  const cards = list.map(r => {
    const img = r.image_url
      ? `<img src="${r.image_url}" alt="${r.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="suggested-mini-placeholder" style="display:none">${CATEGORY_EMOJI[r.category]||'🍽'}</div>`
      : `<div class="suggested-mini-placeholder">${CATEGORY_EMOJI[r.category]||'🍽'}</div>`;
    return `<div class="suggested-mini" onclick="closeModal();setTimeout(()=>handleCardClick('${r.id}'),200)">${img}<div class="suggested-mini-body"><div class="suggested-mini-title">${r.title}</div></div></div>`;
  }).join('');
  return `<div class="suggested-row"><div class="modal-section-title" style="margin-top:0">Goes well with</div><div class="suggested-scroll">${cards}</div></div>`;
}

// ── Cook Log ───────────────────────────────────────────────────────────────────
function getCookLog() {
  try { return JSON.parse(localStorage.getItem('cook_log') || '[]'); } catch { return []; }
}

function saveCookLog(log) {
  localStorage.setItem('cook_log', JSON.stringify(log));
}

function starsHtml(rating) {
  return '★'.repeat(rating) + '☆'.repeat(5 - rating);
}

function renderCookLog(recipe) {
  const entries = getCookLog().filter(e => e.recipeId === recipe.id);
  const rows = entries.map(e => `
    <div class="log-entry">
      <div class="log-entry-stars">${starsHtml(e.rating)}</div>
      <div class="log-entry-body">
        <div class="log-entry-meta">${PROFILES[e.profile]?.emoji || ''} ${PROFILES[e.profile]?.name || e.profile} · ${e.date}</div>
        ${e.note ? `<div class="log-entry-note">${e.note}</div>` : ''}
      </div>
    </div>`).join('');
  return `
    <div class="cook-log-section">
      <div class="modal-section-title" style="margin-top:0">Cook Log</div>
      ${rows ? `<div class="cook-log-entries">${rows}</div>` : '<p style="font-size:13px;color:var(--ink-light);margin-bottom:12px">No cooks logged yet.</p>'}
      <button class="log-cook-btn" onclick="showLogForm()">+ Log a cook</button>
      <div id="logForm" style="display:none">
        <div class="log-form">
          <div class="star-picker" id="starPicker">
            ${[1,2,3,4,5].map(n => `<button class="star-btn" data-star="${n}" onclick="setStars(${n})">★</button>`).join('')}
          </div>
          <textarea class="log-note-input" id="logNote" rows="2" placeholder="Add a note (optional)…"></textarea>
          <button class="log-submit-btn" onclick="submitLog('${recipe.id}')">Save</button>
        </div>
      </div>
    </div>`;
}

function showLogForm() {
  const form = document.getElementById('logForm');
  if (!form) return;
  form.style.display = form.style.display === 'block' ? 'none' : 'block';
  selectedRating = 0;
  updateStarPicker();
}

function setStars(n) {
  selectedRating = n;
  updateStarPicker();
}

function updateStarPicker() {
  const picker = document.getElementById('starPicker');
  if (!picker) return;
  picker.querySelectorAll('.star-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.star) <= selectedRating);
  });
}

function submitLog(recipeId) {
  if (!selectedRating) { alert('Please select a star rating first.'); return; }
  const note = (document.getElementById('logNote')?.value || '').trim();
  const log = getCookLog();
  log.push({ recipeId, profile: getProfile(), rating: selectedRating, note, date: new Date().toISOString().slice(0,10) });
  saveCookLog(log);
  // Re-render cook log (currentRecipe must still be set)
  if (currentRecipe) {
    document.getElementById('modalCookLog').innerHTML = renderCookLog(currentRecipe);
  }
}

// ── Collections ────────────────────────────────────────────────────────────────
function getCollections() {
  try { return JSON.parse(localStorage.getItem('recipe_collections') || '[]'); } catch { return []; }
}

function saveCollections(cols) {
  localStorage.setItem('recipe_collections', JSON.stringify(cols));
}

function renderCollectionsSection() {
  const el   = document.getElementById('collectionsSection');
  if (!el) return;
  const cols = getCollections();
  const newCard = `<div class="new-collection-card" onclick="promptNewCollection()"><span class="nc-plus">＋</span><span class="nc-label">New</span></div>`;

  if (!cols.length) {
    el.innerHTML = `<div class="section-label">My Collections</div><div class="collections-scroll">${newCard}</div>`;
    return;
  }

  const cards = cols.map(col => {
    const recipes = col.recipeIds.map(id => allRecipes.find(r => r.id === id)).filter(Boolean);
    const thumbs  = recipes.slice(0, 3).map(r =>
      r?.image_url
        ? `<img src="${r.image_url}" alt="" onerror="this.style.display='none'">`
        : `<div class="collection-thumb-placeholder">${CATEGORY_EMOJI[r?.category]||'🍽'}</div>`
    ).join('') || `<div class="collection-thumb-placeholder" style="flex:1">📋</div>`;
    return `
      <div class="collection-card" onclick="openCollectionDetail('${col.id}')">
        <div class="collection-thumb-strip">${thumbs}</div>
        <div class="collection-card-body">
          <div class="collection-emoji">${col.emoji}</div>
          <div class="collection-name">${col.name}</div>
          <div class="collection-count">${recipes.length} recipe${recipes.length !== 1 ? 's' : ''}</div>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `<div class="section-label">My Collections</div><div class="collections-scroll">${newCard}${cards}</div>`;
}

function promptNewCollection() {
  const name = window.prompt('Collection name (e.g. Thai Dinner):');
  if (!name?.trim()) return;
  const emojis = ['🍜','🍕','🍣','🥘','🥗','🍲','🍛','🥩','🌮','🎉'];
  const picked = window.prompt(`Pick an emoji for "${name}":\n${emojis.join('  ')}`, '🍽');
  const emoji  = picked?.trim() || '🍽';
  const col    = { id: Date.now().toString(36), name: name.trim(), emoji, recipeIds: [], createdBy: getProfile(), createdAt: new Date().toISOString().slice(0,10) };
  const cols   = getCollections();
  cols.push(col);
  saveCollections(cols);
  renderCollectionsSection();
}

function showCollectionSheet() {
  const cols = getCollections();
  const rows = cols.map(col => `
    <div class="collection-option" onclick="addRecipeToCollection('${col.id}')">
      <span class="col-opt-emoji">${col.emoji}</span>
      <div>
        <div class="col-opt-name">${col.name}</div>
        <div class="col-opt-count">${col.recipeIds.length} recipe${col.recipeIds.length !== 1 ? 's' : ''}</div>
      </div>
    </div>`).join('');
  document.getElementById('sheetContent').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add to Collection</div>
    ${rows || '<p style="font-size:14px;color:var(--ink-light);margin-bottom:14px">No collections yet.</p>'}
    <div class="new-col-option" onclick="closeCollectionSheet();promptNewCollection()">＋ New collection</div>`;
  document.getElementById('sheetOverlay').classList.add('open');
}

function closeCollectionSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
}

function closeCollectionSheetOnBg(e) {
  if (e.target === document.getElementById('sheetOverlay')) closeCollectionSheet();
}

function addRecipeToCollection(colId) {
  if (!currentRecipe) return;
  const cols = getCollections();
  const col  = cols.find(c => c.id === colId);
  if (col && !col.recipeIds.includes(currentRecipe.id)) {
    col.recipeIds.push(currentRecipe.id);
    saveCollections(cols);
  }
  closeCollectionSheet();
  renderCollectionsSection();
}

function openCollectionDetail(colId) {
  const cols    = getCollections();
  const col     = cols.find(c => c.id === colId);
  if (!col) return;
  const recipes = col.recipeIds.map(id => allRecipes.find(r => r.id === id)).filter(Boolean);
  document.getElementById('collectionDetailTitle').textContent = `${col.emoji} ${col.name}`;
  document.getElementById('collectionDetailGrid').innerHTML = recipes.map(r => {
    const img = r.image_url
      ? `<img class="card-img" src="${r.image_url}" alt="${r.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-img-placeholder" style="display:none">${CATEGORY_EMOJI[r.category]||'🍽'}</div>`
      : `<div class="card-img-placeholder">${CATEGORY_EMOJI[r.category]||'🍽'}</div>`;
    return `
      <div class="recipe-card" onclick="handleCardClick('${r.id}')">
        <button class="remove-from-col" onclick="event.stopPropagation();removeFromCollection('${colId}','${r.id}')">✕</button>
        ${img}
        <div class="card-body">
          <div class="card-category">${r.category||''}</div>
          <div class="card-title">${r.title}</div>
        </div>
      </div>`;
  }).join('') || '<p style="padding:16px;color:var(--ink-light);font-size:14px">No recipes in this collection yet.</p>';
  document.getElementById('collectionDetail').dataset.colId = colId;
  document.getElementById('collectionDetail').classList.add('open');
}

function closeCollectionDetail() {
  document.getElementById('collectionDetail').classList.remove('open');
}

function removeFromCollection(colId, recipeId) {
  const cols = getCollections();
  const col  = cols.find(c => c.id === colId);
  if (col) {
    col.recipeIds = col.recipeIds.filter(id => id !== recipeId);
    saveCollections(cols);
    openCollectionDetail(colId);
    renderCollectionsSection();
  }
}

// ── Service Worker ─────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Boot ───────────────────────────────────────────────────────────────────────
init();
</script>
